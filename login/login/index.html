<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-logo">
      <img src="922abd68-1446-4ad9-b263-9ff3a11938cc.png" alt="Logo">
  </nav>
    <div class="main-wrapper" id="login">
      <div class="form-box" id="login-form">
        <!--Log In-->
        <form action="log in">
         <h3>Welcome to DTC Attendance Tracker</h3>
         <p>Sign in to your account</p>
         <div class="input-containers">
          <span class="icon">
            <i class="bi bi-person"></i>
          </span>
          <input type="username" placeholder="Username" pattern="(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must be at least 8 characters long and include at least one uppercase and one lowercase letter." required>
         </div>
         <div class="input-containers">
          <span class="icon">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" placeholder="Password" required>
         </div>
        <p>Forgot Password? <a href="Recovery.html">Click Here!</a></p>
        <button type="button" class="btn-primary" onclick="goTodashboard()">Log In</button>
        <p>Don't have an account? <a href="registration_form.html">Register</a></p>
        </form>
      </div>
    </div>
    <script>
      function goTodashboard(){
        window.location.href = "supervisor_dashboard.html";
        alert("Login clicked");
      }
      
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
