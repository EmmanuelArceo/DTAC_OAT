<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Account Recovery</title>
</head>
<body>
    <div class="main-wrapper" id="recovery">
        <div class="form-box" id="recovery-form">
            <form action="recovery-process">
                <h1>Recover Account</h1>
                <p>Enter your email address to reset your password.</p>
                <div class="input-containers">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <button type="button" class="btn btn-primary">Send Recovery Link</button>
                <p>Remembered your password? <a href="index.html">Log In</a></p>
            </form>
        </div>
    </div>
</body>
</html>
